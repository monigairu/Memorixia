name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: lint + typecheck (app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx expo lint
      - run: npx tsc --noEmit
